<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#003b71">
  <title>Nurse Woyz Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f8fc;
      color: #162033;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .card {
      width: min(420px, calc(100% - 32px));
      background: #fff;
      border: 1px solid #d7e1ef;
      border-radius: 20px;
      box-shadow: 0 16px 48px rgba(20, 40, 70, 0.12);
      padding: 24px;
      text-align: center;
    }
    .mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: #003b71;
      color: #fff;
      font-size: 28px;
      font-weight: 800;
    }
    h1 {
      color: #003b71;
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      color: #61738a;
      line-height: 1.5;
      margin: 0 0 16px;
    }
    button {
      border: 0;
      border-radius: 12px;
      background: #005ea8;
      color: #fff;
      padding: 12px 18px;
      font-weight: 800;
      font: inherit;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">NW</div>
    <h1>Nurse Woyz is offline</h1>
    <p>Please reconnect to the internet and open the app again. Firestore sync and demo transfer requests need network access.</p>
    <button onclick="location.reload()">Try Again</button>
  </main>
</body>
</html>
